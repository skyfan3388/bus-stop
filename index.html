<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巴士站查詢</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

.container {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

input, select {
    padding: 10px;
    font-size: 16px;
}

.routeInput {
    flex: 1;
    min-width: 120px;
}

.stopSelect {
    flex: 2;
    min-width: 250px;
}

.directionSelect {
    flex: 1.5;
    min-width: 200px;
}
</style>
</head>

<body>

<h2>巴士站查詢（自動搜尋）</h2>

<div class="container">
    <!-- 左：巴士號碼 -->
    <input type="text" id="routeInput" class="routeInput" placeholder="輸入巴士號碼 (例如 38)">

    <!-- 中：所有站 -->
    <select id="stopSelect" class="stopSelect">
        <option>請輸入巴士號碼</option>
    </select>

    <!-- 右：終點站 -->
    <select id="directionSelect" class="directionSelect">
        <option>請輸入巴士號碼</option>
    </select>
</div>

<script>

const routeInput = document.getElementById("routeInput");
const stopSelect = document.getElementById("stopSelect");
const directionSelect = document.getElementById("directionSelect");

let debounceTimer;
let currentRoutes = [];

/* 自動搜尋 */
routeInput.addEventListener("input", function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadRoute, 500);
});

/* 切換終點站 */
directionSelect.addEventListener("change", loadStops);

/* 讀取路線資料 */
async function loadRoute() {

    const route = routeInput.value.trim().toUpperCase();

    if (!route) {
        stopSelect.innerHTML = "<option>請輸入巴士號碼</option>";
        directionSelect.innerHTML = "<option>請輸入巴士號碼</option>";
        return;
    }

    stopSelect.innerHTML = "<option>載入中...</option>";
    directionSelect.innerHTML = "<option>載入中...</option>";

    try {

        const res = await fetch("https://data.etabus.gov.hk/v1/transport/kmb/route/");
        const data = await res.json();

        currentRoutes = data.data.filter(r => r.route === route);

        if (currentRoutes.length === 0) {
            stopSelect.innerHTML = "<option>找不到路線</option>";
            directionSelect.innerHTML = "<option>找不到路線</option>";
            return;
        }

        directionSelect.innerHTML = "";

        currentRoutes.forEach(item => {
            const option = document.createElement("option");
            option.value = item.bound;
            option.textContent = item.dest_tc;   // 只顯示終點站
            directionSelect.appendChild(option);
        });

        loadStops();

    } catch (error) {
        console.error(error);
        stopSelect.innerHTML = "<option>API 錯誤</option>";
    }
}

/* 讀取站點 */
async function loadStops() {

    const route = routeInput.value.trim().toUpperCase();
    const bound = directionSelect.value;

    if (!route || !bound) return;

    stopSelect.innerHTML = "<option>載入站點...</option>";

    try {

        // ✅ 找正確 service_type
        const routeInfo = currentRoutes.find(r => r.bound === bound);
        const serviceType = routeInfo.service_type;

        const routeUrl =
            `https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/outbound/1`;

        const routeResponse = await fetch(routeUrl);
        const routeData = await routeResponse.json();

        if (!routeData.data || routeData.data.length === 0) {
            stopSelect.innerHTML = "<option>找不到站點</option>";
            return;
        }

        const sortedStops = routeData.data.sort((a, b) =>
            parseInt(a.seq) - parseInt(b.seq)
        );

        // ✅ 同時抓所有 stop（加速）
        const stopPromises = sortedStops.map(item =>
            fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${item.stop}`)
                .then(res => res.json())
        );

        const stopResults = await Promise.all(stopPromises);

        stopSelect.innerHTML = "";

        stopResults.forEach(result => {
            if (!result.data) return;

            const option = document.createElement("option");
            option.value = result.data.stop;
            option.textContent = result.data.name_tc;
            stopSelect.appendChild(option);
        });

    } catch (error) {
        console.error(error);
        stopSelect.innerHTML = "<option>發生錯誤</option>";
    }
}

</script>

</body>
</html>
