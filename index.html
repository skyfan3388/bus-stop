<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巴士路線查詢</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

.container {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

input, select {
    padding: 10px;
    font-size: 16px;
}

.routeInput {
    flex: 1;
    min-width: 120px;
}

.stopSelect {
    flex: 2;
    min-width: 220px;
}

.directionSelect {
    flex: 2;
    min-width: 200px;
}
</style>
</head>

<body>

<h2>巴士路線查詢</h2>

<div class="container">
    <!-- 左：輸入巴士號碼 -->
    <input type="text" id="routeInput" class="routeInput" placeholder="請輸入巴士號碼">

    <!-- 中：所有站名 -->
    <select id="stopSelect" class="stopSelect">
        <option>請輸入巴士號碼</option>
    </select>

    <!-- 右：尾站 -->
    <select id="directionSelect" class="directionSelect">
        <option>請輸入巴士號碼</option>
    </select>
</div>

<script>

const routeInput = document.getElementById("routeInput");
const stopSelect = document.getElementById("stopSelect");
const directionSelect = document.getElementById("directionSelect");

let debounceTimer;

// 自動搜尋
routeInput.addEventListener("input", function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        loadRoute();
    }, 500);
});

directionSelect.addEventListener("change", function () {
    loadStops();
});

async function loadRoute() {

    const route = routeInput.value.trim().toUpperCase();

    if (!route) {
        stopSelect.innerHTML = "<option>請輸入巴士號碼</option>";
        directionSelect.innerHTML = "<option>請輸入巴士號碼</option>";
        return;
    }

    stopSelect.innerHTML = "<option>載入中...</option>";
    directionSelect.innerHTML = "<option>載入中...</option>";

    try {

        // 取得所有 route 再 filter
        const res = await fetch("https://data.etabus.gov.hk/v1/transport/kmb/route/");
        const data = await res.json();

        const matchedRoutes = data.data.filter(r => r.route === route);

        if (matchedRoutes.length === 0) {
            stopSelect.innerHTML = "<option>找不到路線</option>";
            directionSelect.innerHTML = "<option>找不到路線</option>";
            return;
        }

        // ✅ 右邊只顯示尾站
        directionSelect.innerHTML = "";

        matchedRoutes.forEach(item => {
            const option = document.createElement("option");
            option.value = item.bound;   // O / I
            option.textContent = item.dest_tc; // 只顯示尾站
            directionSelect.appendChild(option);
        });

        loadStops();

    } catch (error) {
        console.error(error);
        stopSelect.innerHTML = "<option>發生錯誤</option>";
        directionSelect.innerHTML = "<option>發生錯誤</option>";
    }
}

async function loadStops() {

    const route = routeInput.value.trim().toUpperCase();
    const bound = directionSelect.value;

    if (!route || !bound) return;

    stopSelect.innerHTML = "<option>載入站點...</option>";

    try {

        // ✅ 正確使用 O / I
        const res = await fetch(
            `https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${bound}/1`
        );

        const data = await res.json();

        const sortedStops = data.data.sort((a, b) =>
            parseInt(a.seq) - parseInt(b.seq)
        );

        const stopPromises = sortedStops.map(item =>
            fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${item.stop}`)
                .then(res => res.json())
        );

        const stopResults = await Promise.all(stopPromises);

        stopSelect.innerHTML = "";

        stopResults.forEach(result => {
            const option = document.createElement("option");
            option.value = result.data.stop;
            option.textContent = result.data.name_tc;
            stopSelect.appendChild(option);
        });

    } catch (error) {
        console.error(error);
        stopSelect.innerHTML = "<option>發生錯誤</option>";
    }
}

</script>

</body>
</html>
