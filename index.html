<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巴士站查詢</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

.container {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

input, select {
    padding: 10px;
    font-size: 16px;
}

.destinationSelect {
    flex: 1.5;
    min-width: 200px;
}

.stopSelect {
    flex: 2;
    min-width: 250px;
}

.routeInput {
    flex: 1;
    min-width: 150px;
}
</style>
</head>

<body>

<h2>巴士站查詢</h2>

<div class="container">

    <!-- 左：尾站 -->
    <select id="destinationSelect" class="destinationSelect">
        <option>請輸入巴士號碼</option>
    </select>

    <!-- 中：所有站 -->
    <select id="stopSelect" class="stopSelect">
        <option>請輸入巴士號碼</option>
    </select>

    <!-- 右：輸入巴士號碼 -->
    <input type="text" id="routeInput" class="routeInput"
           placeholder="輸入巴士號碼 (例如 38)">

</div>

<script>

const routeInput = document.getElementById("routeInput");
const destinationSelect = document.getElementById("destinationSelect");
const stopSelect = document.getElementById("stopSelect");

let debounceTimer;

/* ✅ 輸入巴士號碼 */
routeInput.addEventListener("input", function () {

    clearTimeout(debounceTimer);

    debounceTimer = setTimeout(() => {
        loadRoute();
    }, 500);
});

/* ✅ 選擇尾站 */
destinationSelect.addEventListener("change", loadStops);


/* =========================
   讀取路線（顯示尾站）
========================= */
async function loadRoute() {

    const route = routeInput.value.trim().toUpperCase();

    if (!route) {
        destinationSelect.innerHTML = "<option>請輸入巴士號碼</option>";
        stopSelect.innerHTML = "<option>請輸入巴士號碼</option>";
        return;
    }

    destinationSelect.innerHTML = "<option>載入中...</option>";
    stopSelect.innerHTML = "<option>請選擇尾站</option>";

    try {

        const res = await fetch(
            "https://data.etabus.gov.hk/v1/transport/kmb/route/"
        );

        const data = await res.json();

        const matched = data.data.filter(r => r.route === route);

        if (matched.length === 0) {
            destinationSelect.innerHTML = "<option>找不到路線</option>";
            return;
        }

        destinationSelect.innerHTML = "";

        matched.forEach(item => {

            const option = document.createElement("option");

            // 儲存 O|1 或 I|1
            option.value = `${item.bound}|${item.service_type}`;

            option.textContent = item.dest_tc;

            destinationSelect.appendChild(option);
        });

        loadStops();

    } catch (error) {

        console.error(error);
        destinationSelect.innerHTML = "<option>API 錯誤</option>";
    }
}


/* =========================
   讀取該方向所有站
========================= */
async function loadStops() {

    const route = routeInput.value.trim().toUpperCase();
    const selected = destinationSelect.value;

    if (!route || !selected) return;

    stopSelect.innerHTML = "<option>載入站點...</option>";

    const [bound, serviceType] = selected.split("|");

    // ✅ 將 O / I 轉成 outbound / inbound
    const boundText = bound === "O" ? "outbound" : "inbound";

    try {

        const routeUrl =
            `https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${boundText}/${serviceType}`;

        const routeResponse = await fetch(routeUrl);
        const routeData = await routeResponse.json();

        if (!routeData.data || routeData.data.length === 0) {
            stopSelect.innerHTML = "<option>找不到站點</option>";
            return;
        }

        const sortedStops = routeData.data.sort((a, b) =>
            parseInt(a.seq) - parseInt(b.seq)
        );

        const stopPromises = sortedStops.map(item =>
            fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${item.stop}`)
                .then(res => res.json())
        );

        const stopResults = await Promise.all(stopPromises);

        stopSelect.innerHTML = "";

        stopResults.forEach(result => {

            if (!result.data) return;

            const option = document.createElement("option");

            option.value = result.data.stop;
            option.textContent = result.data.name_tc;

            stopSelect.appendChild(option);
        });

    } catch (error) {

        console.error(error);
        stopSelect.innerHTML = "<option>發生錯誤</option>";
    }
}

</script>

</body>
</html>
