<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巴士路線查詢</title>

<style>
body { font-family: Arial; padding:20px; }
.container { display:flex; gap:10px; flex-wrap:wrap; }
input, select { padding:10px; font-size:16px; }
.routeInput { flex:1; min-width:120px; }
.stopSelect { flex:2; min-width:250px; }
.directionSelect { flex:1.5; min-width:200px; }
</style>
</head>
<body>

<h2></h2>

<div class="container">
    <input type="text" id="routeInput" class="routeInput" placeholder="請輸入巴士號碼">
    <select id="stopSelect" class="stopSelect">
        <option>請輸入巴士號碼</option>
    </select>
    <select id="directionSelect" class="directionSelect">
        <option>請輸入巴士號碼</option>
    </select>
</div>

<script>

const routeInput = document.getElementById("routeInput");
const stopSelect = document.getElementById("stopSelect");
const directionSelect = document.getElementById("directionSelect");

let allStops = [];   // ✅ 儲存全部 stop
let debounceTimer;

/* 預先下載所有站資料（只做一次） */
fetch("https://data.etabus.gov.hk/v1/transport/kmb/stop/")
.then(res => res.json())
.then(data => {
    if (data && data.data) {
        allStops = data.data;
        console.log("Stops loaded:", allStops.length);
    }
});

/* 自動搜尋 */
routeInput.addEventListener("input", function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadRoute, 500);
});

/* 揀終點站 */
directionSelect.addEventListener("change", loadStops);

async function loadRoute() {

    const route = routeInput.value.trim().toUpperCase();
    if (!route) return;

    stopSelect.innerHTML = "<option>載入中...</option>";
    directionSelect.innerHTML = "<option>載入中...</option>";

    try {

        const res = await fetch("https://data.etabus.gov.hk/v1/transport/kmb/route/");
        const data = await res.json();

        if (!data || !data.data) throw new Error();

        const matched = data.data.filter(r => r.route === route);

        if (matched.length === 0) {
            stopSelect.innerHTML = "<option>找不到路線</option>";
            directionSelect.innerHTML = "<option>找不到路線</option>";
            return;
        }

        directionSelect.innerHTML = "";

        matched.forEach(item => {
            const option = document.createElement("option");
            option.value = item.bound;
            option.textContent = item.dest_tc;
            directionSelect.appendChild(option);
        });

        loadStops();

    } catch {
        stopSelect.innerHTML = "<option>API 錯誤</option>";
    }
}

async function loadStops() {

    const route = routeInput.value.trim().toUpperCase();
    const bound = directionSelect.value;

    if (!route || !bound) return;

    stopSelect.innerHTML = "<option>載入站點...</option>";

    try {

        const res = await fetch(
            `https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${bound}/1`
        );

        const data = await res.json();
        if (!data || !data.data) throw new Error();

        const sorted = data.data.sort((a,b)=>a.seq-b.seq);

        stopSelect.innerHTML = "";

        sorted.forEach(item => {

            const stopInfo = allStops.find(s => s.stop === item.stop);

            if (stopInfo) {
                const option = document.createElement("option");
                option.value = stopInfo.stop;
                option.textContent = stopInfo.name_tc;
                stopSelect.appendChild(option);
            }
        });

        if (stopSelect.innerHTML === "")
            stopSelect.innerHTML = "<option>無站點資料</option>";

    } catch {
        stopSelect.innerHTML = "<option>發生錯誤</option>";
    }
}

</script>
</body>
</html>
