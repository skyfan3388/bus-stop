<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巴士站查詢</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

.container {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

input, select {
    padding: 10px;
    font-size: 16px;
}

input {
    flex: 1;
    min-width: 150px;
}

select {
    flex: 2;
    min-width: 200px;
}
</style>
</head>

<body>

<h2>巴士站查詢（自動搜尋）</h2>

<div class="container">
    <input type="text" id="routeInput" placeholder="輸入巴士號碼 (例如 38)">
    <select id="stopSelect">
        <option>請輸入巴士號碼</option>
    </select>
</div>

<script>

const routeInput = document.getElementById("routeInput");
const stopSelect = document.getElementById("stopSelect");

let debounceTimer;

// 自動搜尋（停止輸入 500ms 後執行）
routeInput.addEventListener("input", function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        loadStops();
    }, 500);
});

async function loadStops() {

    const route = routeInput.value.trim();

    if (!route) {
        stopSelect.innerHTML = "<option>請輸入巴士號碼</option>";
        return;
    }

    stopSelect.innerHTML = "<option>載入中...</option>";

    try {

        // 1️⃣ 取得 route-stop
        const routeUrl = `https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/outbound/1`;
        const routeResponse = await fetch(routeUrl);
        const routeData = await routeResponse.json();

        if (!routeData.data || routeData.data.length === 0) {
            stopSelect.innerHTML = "<option>找不到路線</option>";
            return;
        }

        // 排序 seq
        const sortedStops = routeData.data.sort((a, b) =>
            parseInt(a.seq) - parseInt(b.seq)
        );

        // 2️⃣ 同時取得所有 stop 資料（加速）
        const stopPromises = sortedStops.map(item => 
            fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${item.stop}`)
                .then(res => res.json())
        );

        const stopResults = await Promise.all(stopPromises);

        stopSelect.innerHTML = "";

        stopResults.forEach(result => {
            const option = document.createElement("option");
            option.value = result.data.stop;
            option.textContent = result.data.name_tc;
            stopSelect.appendChild(option);
        });

    } catch (error) {
        console.error(error);
        stopSelect.innerHTML = "<option>發生錯誤</option>";
    }
}

</script>

</body>
</html>
